amcl:
  ros__parameters:
    # --- Frames: must match OUR robot's TF tree ---
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "scan"

    # --- Motion model: differential drive ---
    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    # --- Laser model, tuned to our lidar ---
    laser_model_type: "likelihood_field"
    laser_max_range: 12.0       # matches lidar <max>
    laser_min_range: 0.15       # matches lidar <min>
    max_beams: 60               # beams subsampled per scan for matching
    laser_likelihood_max_dist: 2.0

    # --- Particle filter size ---
    min_particles: 500
    max_particles: 2000

    # --- Filter updates only after the robot moves this much ---
    update_min_d: 0.25          # metres
    update_min_a: 0.2           # radians
    resample_interval: 1

    # --- Motion noise (diff-drive odometry alphas) ---
    alpha1: 0.2   # rot noise from rotation
    alpha2: 0.2   # rot noise from translation
    alpha3: 0.2   # trans noise from translation
    alpha4: 0.2   # trans noise from rotation
    alpha5: 0.2

    # --- Likelihood-field beam mixture weights ---
    z_hit: 0.5
    z_rand: 0.5
    z_max: 0.05
    z_short: 0.05
    sigma_hit: 0.2

    # --- Start pose: the map origin = where mapping began ---
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

    # --- Publish the map -> odom correction ---
    tf_broadcast: true
    transform_tolerance: 1.0
    save_pose_rate: 0.5

map_server:
  ros__parameters:
    yaml_filename: ""   # set from the launch file (package-relative path)